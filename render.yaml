# Render configuration for Schedulite.
#
# Database: external Postgres at Neon (https://neon.tech).
#   DATABASE_URL must be set manually in the Render dashboard
#   under Environment. Migrations run on container start via
#   bin/docker-entrypoint when DATABASE_URL is present.
#
# Background jobs: not provisioned. SmsService and other side-effect
#   work runs synchronously in-request. To add Sidekiq later, create
#   a Render Redis service, add REDIS_URL here, and add a worker
#   service block running `bundle exec sidekiq`.

services:
  - type: web
    name: schedulite
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: LOCKBOX_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: APP_HOST
        value: https://www.schedulite.io
      # DATABASE_URL is set manually in the dashboard (Neon connection string)

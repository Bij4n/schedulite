default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: db/development.sqlite3

test:
  <<: *default
  database: db/test.sqlite3

production:
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  # DATABASE_URL is read automatically by Rails when present.
  # We do NOT set `url:` explicitly — passing an empty string makes
  # the pg gem fall back to local Unix sockets, masking the real cause.

<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Page not found - Schedulite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, ui-sans-serif, system-ui, sans-serif; background: #f9fafb; color: #111827; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .card { text-align: center; max-width: 24rem; }
    .code { font-size: 4rem; font-weight: 700; color: #0E9C8A; }
    .title { font-size: 1.25rem; font-weight: 600; margin-top: 0.5rem; }
    .desc { font-size: 0.875rem; color: #6b7280; margin-top: 0.5rem; }
    .link { display: inline-block; margin-top: 1.5rem; padding: 0.625rem 1.25rem; background: #0E9C8A; color: #fff; border-radius: 0.75rem; text-decoration: none; font-size: 0.875rem; font-weight: 600; }
    .link:hover { background: #0c8a7a; }
  </style>
</head>
<body>
  <div class="card">
    <div class="code">404</div>
    <h1 class="title">Page not found</h1>
    <p class="desc">The page you're looking for doesn't exist or may have been moved.</p>
    <a href="/" class="link">Back to dashboard</a>
  </div>
</body>
</html>
